# ============================================================================
# Global Configuration Settings
# ============================================================================

# Logging Configuration
LOG_MAX_SIZE="10M"  # Max log size before rotation
LOG_MAX_FILES="5"   # Number of rotated logs to keep

# Debug Mode (0=off, 1=on)
DEBUG_MODE=0
VERBOSE_MODE=0

# Default paths
DEFAULT_BACKUP_DIR="/tmp/backups"
DEFAULT_TEMP_DIR="/tmp"

# Application Settings
APP_NAME="VirtualMachineManager"
APP_VERSION="1.0.0"

# Timeout settings (in seconds)
DEFAULT_TIMEOUT=30
NETWORK_TIMEOUT=10

# Color settings (0=disable, 1=enable)
USE_COLORS=1